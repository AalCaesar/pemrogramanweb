<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="search">
        <div class="title">
            <h1>Car Rental</h1>
            <p>Find the perfect car for your next adventure</p>
            <hr>
        </div>
        <div class="form-container">
            <div class="form-group">
                <label for="pickup">Rental Location:</label>
                <select id="pickup" name="pickup">
                    <option value="">Select Location</option>
                    <option value="location1">Yogyakarta</option>
                    <option value="location2">Bali</option>
                </select>
            </div>
            <div class="form-group">
                <label for="pickup-date">Rental Start Date:</label>
                <input type="date" id="pickup-date" name="pickup-date">
            </div>
            <div class="form-group">
                <label for="return-date">Rental End Date:</label>
                <input type="date" id="return-date" name="return-date">
            </div>
            <button type="submit">Search</button>
        </div>
    </div>

    <div class="car-list">
        <h2>Car List</h2>
        <div class="car-item">
            <img src="https://i.pinimg.com/1200x/7c/08/e6/7c08e6bd5e9916ecef2e2e600828338c.jpg" alt="Car 1">
            <h3>Car 1</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="https://i.pinimg.com/1200x/7f/62/c5/7f62c56d673a9e468d1f7ab864922096.jpg" alt="Car 2">
            <h3>Car 2</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="https://i.pinimg.com/736x/99/47/5b/99475bc2042e9b0a6ddb119b397fa958.jpg" alt="Car 2">
            <h3>Car 2</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="https://i.pinimg.com/1200x/7c/4c/75/7c4c753add52186c60ac175db48b2fc9.jpg" alt="Car 2">
            <h3>Car 2</h3>
            <p>Car Detail</p>
        </div>
    </div>
</body>

</html>
