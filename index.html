<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aellstillyearn</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: radial-gradient(circle at top, #121212, #050505);
    color: #eaeaea;
    text-align: center;
}

/* HEADER */
header {
    padding: 18px;
    font-size: 0.9em;
    letter-spacing: 4px;
    color: #ff4d6d;
    background: rgba(0,0,0,0.6);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* PROFILE */
img {
    margin-top: 40px;
    width: 170px;
    height: 170px;
    object-fit: cover;
    border-radius: 50%;
    border: 2px solid rgba(255,77,109,0.7);
    box-shadow: 0 0 30px rgba(255,77,109,0.15);
    transition: 0.4s ease;
    filter: grayscale(20%) contrast(1.1);
}

img:hover {
    transform: scale(1.05);
    filter: grayscale(0%);
}

/* TEXT */
h1 {
    margin-top: 18px;
    font-size: 1.6em;
    font-weight: 600;
    letter-spacing: 1px;
}

p {
    opacity: 0.6;
    margin-top: 4px;
    font-size: 0.95em;
}

.desc {
    margin-top: 14px;
    font-size: 0.9em;
    opacity: 0.5;
    font-style: italic;
}

/* SMALL LINE */
.line {
    width: 60px;
    height: 1px;
    background: rgba(255,77,109,0.4);
    margin: 15px auto;
}
</style>
</head>

<body>

<header>
    AELLSTILLYEARN
</header>

<img src="https://i.pinimg.com/736x/bb/a9/41/bba94111d280cd70feb111fcf415ae48.jpg">

<h1>Muhammad Slamet Nur Alif</h1>
<p>Informatika</p>
<p>241110078</p>

<div class="line"></div>

<div class="desc">
    Me and my music taste against the world
</div>

<div class="music">
    <p style="opacity:0.7; font-size:0.85em;">The Man Who Can’t Be Moved</p>

<audio id="audio">
    <source src="Fall/yearn.mp3" type="audio/mpeg">
</audio>

<button id="btn">Play / Pause</button>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");

btn.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
        btn.innerText = "Pause";
    } else {
        audio.pause();
        btn.innerText = "Play";
    }
});
</script>
</body>
</html>
