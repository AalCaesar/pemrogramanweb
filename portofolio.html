<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Aipp</title>
    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
            max-width: 800px;
            margin: auto;
        }
        header {
            text-align: center;
            padding: 20px 0;
            background: #2c3e50;
            color: white;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        nav {
            text-align: center;
            position: sticky;
            top: 0;
            background: rgba(244, 244, 249, 0.9);
            padding: 10px 0;
            z-index: 1000;
        }
        nav a {
            text-decoration: none;
            color: #3498db;
            margin: 0 15px;
            font-weight: bold;
        }
        .profile-img {
            display: block;
            margin: 0 auto;
            border: 5px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .project-gallery {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top: 40px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            background-color: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Portofolio</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <div style="text-align: center;">
        <img src="Fall/aell.png" alt="My Mine" class="profile-img" style="width: 200px; height: 200px; border-radius: 50%; object-fit: cover;">
        <h2>Muhammad Slamet Nur Alif</h2>
        <p>Holla Saya Aipp, Mahasiswa Informatika</p>
    </div>

    <hr>

    <h2 id="about">Skills</h2>
    <ul>
        <li>Photography</li>
        <li>Cinematography</li> 
    </ul>

    <h2>Project Gallery</h2>
    <ol>
        <li>ShortVideo</li> 
        <li>Photography</li> 
    </ol>

    <div class="project-gallery">
        <video width="640" height="360" controls>
        <source src="Fall/shortvid.mp4" type="video/mp4"><br>
        </video>
        <img src="Fall/ntr1.png" width="200px" alt="Concert">
        <img src="Fall/ntr2.png" width="200px" alt="Nature">
        <img src="Fall/ntr3.png" width="200px" alt="Travel">
    </div>

    <form id="contact" action="/submit" method="post">
        <h3>Contact Me</h3>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="massage">Massage</label><br>
        <textarea id="massage" name="massage" rows="4" cols="50" required></textarea><br><br>

        <input type="submit" value="Submit">
    </form>

    <footer style="text-align: center; padding: 40px 0; color: #888;">
        &copy; 2026 Muhammad Slamet Nur Alif
    </footer>

</body>
</html>
